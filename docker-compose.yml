services:
  postgres:
    image: postgres:17-alpine
    container_name: sovereign-postgres
    environment:
      POSTGRES_USER: sovereign
      POSTGRES_PASSWORD: sovereign
      POSTGRES_DB: sovereign
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sovereign"]
      interval: 5s
      timeout: 3s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: sovereign-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD-SHELL", "rabbitmq-diagnostics -q ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    image: sovereign-backend
    container_name: sovereign-backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://sovereign:sovereign@postgres:5432/sovereign
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    command: >
      sh -c "cd /workspace/schema && uv run alembic upgrade head &&
             cd /workspace/backend && uv run uvicorn app.main:app --host 0.0.0.0 --port 8000"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')\""]
      interval: 5s
      timeout: 3s
      retries: 5

  helper:
    build:
      context: .
      dockerfile: helper/Dockerfile
    image: sovereign-helper
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://sovereign:sovereign@postgres:5432/sovereign
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      PREFETCH_COUNT: 8
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    command: uv run python -m helper

  frontend:
    build: ./frontend
    image: sovereign-frontend
    container_name: sovereign-frontend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
      NEXT_PUBLIC_WS_URL: ws://localhost:8000
    depends_on:
      backend:
        condition: service_healthy

volumes:
  pgdata:
