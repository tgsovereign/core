name: Run database migrations

on:
  push:
    branches: [main]
    paths:
      - "schema/alembic/**"

jobs:
  migrate:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: schema

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5

      - run: uv sync --frozen

      - run: uv run alembic upgrade head
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
